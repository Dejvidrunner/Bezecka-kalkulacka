    // ── Athletes localStorage helpers ─────────────────
    const ATH_KEY = "tymdejvid_athletes";
    const ATH_ACTIVE_KEY = "tymdejvid_active_athlete";

    function loadAthletes() {
      try { return JSON.parse(localStorage.getItem(ATH_KEY)) || []; } catch(e) { return []; }
    }
    function saveAthletes(arr) {
      try { localStorage.setItem(ATH_KEY, JSON.stringify(arr)); } catch(e) {}
    }
    function loadActiveAthId() {
      try { return localStorage.getItem(ATH_ACTIVE_KEY) || null; } catch(e) { return null; }
    }
    function saveActiveAthId(id) {
      try { localStorage.setItem(ATH_ACTIVE_KEY, id || ""); } catch(e) {}
    }
    function parsePaceStr(str) {
      if (!str) return null;
      const parts = str.split(":").map(Number);
      if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
      return { m: parts[0], s: parts[1] };
    }
    function makeid() { return Math.random().toString(36).slice(2,9); }

    const ATH_EMOJIS = ["🏃","🏃‍♀️","👟","⚡","🎯","🏅","🥇","🥈","🥉","🌟","💪","🔥","🌄","🦅","🐢","🦁","🐆","🏔️","🌊","❄️","🍀","👑"];

    const ATH_COLORS = ["#4cff00","#4fc3f7","#ff7043","#ffca28","#ab47bc","#26c6da","#ef5350","#aed581","#ff8a65","#80cbc4"];

    // ── AthletesModal ─────────────────────────────────
    function AthletesModal({ onClose, onSelect, activeAthId }) {
      const [athletes, setAthletes] = React.useState(loadAthletes);
      const [editing, setEditing]   = React.useState(null); // null | "new" | athlete object
      const [form, setForm]         = React.useState({ name:"", emoji:"🏃", color:"#4fc3f7", p5k:"", p10k:"", phalf:"", pmar:"", note:"" });

      function openNew() {
        setForm({ name:"", emoji:"🏃", color:"#4fc3f7", p5k:"", p10k:"", phalf:"", pmar:"", note:"" });
        setEditing("new");
      }
      function openEdit(a) {
        setForm({ name:a.name, emoji:a.emoji, color:a.color||"#4fc3f7", p5k:a.p5k||"", p10k:a.p10k||"", phalf:a.phalf||"", pmar:a.pmar||"", note:a.note||"" });
        setEditing(a);
      }
      function saveForm() {
        if (!form.name.trim()) return;
        let updated;
        if (editing === "new") {
          const newA = { ...form, id: makeid() };
          updated = [...athletes, newA];
        } else {
          updated = athletes.map(a => a.id === editing.id ? { ...editing, ...form } : a);
        }
        setAthletes(updated);
        saveAthletes(updated);
        setEditing(null);
      }
      function deleteAth(id) {
        const updated = athletes.filter(a => a.id !== id);
        setAthletes(updated);
        saveAthletes(updated);
        if (activeAthId === id) { onSelect(null); }
      }
      function selectAth(a) {
        onSelect(a);
        onClose();
      }

      const f = (k,v) => setForm(prev => ({...prev, [k]:v}));

      if (editing !== null) {
        return (
          <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditing(null)}>
            <div className="modal-box">
              <button className="modal-close" onClick={()=>setEditing(null)}>✕</button>
              <h2>{editing==="new" ? "➕ Nový svěřenec" : "✏️ Upravit svěřence"}</h2>
              <div className="sub">Osobní záznamy · cílová tempa</div>

              {/* Emoji picker */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:"#666",fontWeight:700,marginBottom:8}}>Avatár</div>
                <div className="emoji-grid">
                  {ATH_EMOJIS.map(e=>(
                    <div key={e} className={"emoji-opt"+(form.emoji===e?" picked":"")} onClick={()=>f("emoji",e)}>{e}</div>
                  ))}
                </div>
              </div>

              {/* Color picker */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:"#666",fontWeight:700,marginBottom:8}}>Barva</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {ATH_COLORS.map(c=>(
                    <div key={c} onClick={()=>f("color",c)} style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",border: form.color===c?"3px solid #fff":"3px solid transparent",boxSizing:"border-box",transition:"border .1s"}} />
                  ))}
                </div>
              </div>

              <div className="profile-field">
                <label>Jméno / přezdívka *</label>
                <input type="text" value={form.name} placeholder="Jan Novák" onChange={e=>f("name",e.target.value)} />
              </div>
              <div style={{fontSize:10,letterSpacing:"2px",textTransform:"uppercase",color:"#666",fontWeight:700,margin:"16px 0 10px"}}>Závodní tempa (min:ss / km)</div>
              <div className="ath-form-grid">
                {[
                  {k:"p5k", label:"💨 5 km", ph:"3:30"},
                  {k:"p10k", label:"🏃 10 km", ph:"3:15"},
                  {k:"phalf", label:"🥈 Půlmaraton", ph:"3:05"},
                  {k:"pmar", label:"🏅 Maraton", ph:"3:18"},
                ].map(fl=>(
                  <div key={fl.k} className="profile-field" style={{marginBottom:10}}>
                    <label>{fl.label}</label>
                    <input type="text" value={form[fl.k]} placeholder={fl.ph} onChange={e=>f(fl.k,e.target.value)} />
                  </div>
                ))}
              </div>
              <div className="profile-field">
                <label>Poznámka (nepovinná)</label>
                <input type="text" value={form.note} placeholder="Příprava na pražský maraton..." onChange={e=>f("note",e.target.value)} />
              </div>
              <div style={{display:"flex",gap:10,marginTop:8}}>
                <button className="profile-apply" onClick={saveForm}>💾 Uložit</button>
                <button onClick={()=>setEditing(null)} style={{flex:"0 0 auto",background:"none",border:"1px solid #2a2a2a",borderRadius:10,padding:"14px 18px",color:"#888",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,cursor:"pointer"}}>Zpět</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal-box" style={{maxWidth:460}}>
            <button className="modal-close" onClick={onClose}>✕</button>
            <h2>👥 Svěřenci</h2>
            <div className="sub">Přepínej mezi atlety · tempa se přepočítají</div>

            <button className="ath-add-btn" onClick={openNew}>➕ Přidat svěřence</button>

            {athletes.length === 0 && (
              <div style={{textAlign:"center",padding:"24px 0",color:"#444",fontSize:13,lineHeight:1.7}}>
                Zatím žádní svěřenci.<br/>Přidej prvního tlačítkem výše.
              </div>
            )}

            <div className="ath-list">
              {athletes.map(a => {
                const paceLabel = a.pmar ? `Mar ${a.pmar}` : a.phalf ? `Půl ${a.phalf}` : a.p10k ? `10k ${a.p10k}` : "";
                return (
                  <div key={a.id} className={"ath-list-item"+(activeAthId===a.id?" active-ath":"")} onClick={()=>selectAth(a)}>
                    <div className="ali-avatar" style={{background: a.color+"22"}}><span>{a.emoji}</span></div>
                    <div className="ali-info">
                      <div className="ali-name" style={{color: activeAthId===a.id ? a.color : "#e8e8e8"}}>{a.name}</div>
                      <div className="ali-paces">{paceLabel}{a.note ? " · "+a.note : ""}</div>
                    </div>
                    <div className="ali-actions" onClick={e=>e.stopPropagation()}>
                      <button className="ali-btn" onClick={()=>openEdit(a)}>✏️</button>
                      <button className="ali-btn del" onClick={()=>deleteAth(a.id)}>🗑</button>
                    </div>
                    {activeAthId===a.id && <div style={{color:"#4cff00",fontSize:16,flexShrink:0}}>✓</div>}
                  </div>
                );
              })}
            </div>

            <div style={{padding:"12px 14px",background:"#111",borderRadius:8,fontSize:11,color:"#444",lineHeight:1.7}}>
              Kliknutím na svěřence se jeho tempa okamžitě nastaví v kalkulačce. Data jsou uložena v prohlížeči.
            </div>
          </div>
        </div>
      );
    }

    // ── AthletesSwitcher (header dropdown) ────────────
    function AthletesSwitcher({ activeAthId, onOpenManage, onSelect }) {
      const [open, setOpen] = React.useState(false);
      const athletes = loadAthletes();
      const active = athletes.find(a => a.id === activeAthId) || null;

      React.useEffect(() => {
        if (!open) return;
        function close(e) { setOpen(false); }
        document.addEventListener("click", close, { once:true });
      }, [open]);

      return (
        <div className="ath-switcher">
          <div className="ath-switcher-btn" onClick={e=>{ e.stopPropagation(); setOpen(o=>!o); }}>
            <div className="ath-avatar" style={{background: active ? active.color+"22" : "#1a1a1a"}}>
              {active ? active.emoji : "👥"}
            </div>
            <span className="ath-name">{active ? active.name : "Svěřenci"}</span>
            <span className="ath-chevron">{open ? "▲" : "▼"}</span>
          </div>
          {open && (
            <div className="ath-dropdown" onClick={e=>e.stopPropagation()}>
              {athletes.length === 0 && (
                <div style={{padding:"14px 16px",fontSize:12,color:"#555"}}>Zatím žádní svěřenci.</div>
              )}
              {athletes.map(a => {
                const paceLabel = a.pmar || a.phalf || a.p10k || "";
                return (
                  <div key={a.id} className={"ath-drop-item"+(activeAthId===a.id?" active":"")}
                    onClick={()=>{ onSelect(a); setOpen(false); }}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:a.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{a.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div className="ath-drop-name" style={{color: activeAthId===a.id ? a.color : "#e8e8e8"}}>{a.name}</div>
                      {paceLabel && <div className="ath-drop-pace">{paceLabel} min/km</div>}
                    </div>
                    {activeAthId===a.id && <div className="ath-drop-tick">✓</div>}
                  </div>
                );
              })}
              <div className="ath-drop-manage" onClick={()=>{ onOpenManage(); setOpen(false); }}>
                ⚙️ Spravovat svěřence
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── localStorage helpers ──────────────────────
    const LS_KEY = "tymdejvid_profile";
    function loadProfile() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { return {}; }
    }
    function saveProfile(p) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(p)); } catch(e) {}
    }

    // ── ProfileModal (quick edit from header button) ──────────────────────────
    function ProfileModal({ onClose, onApply }) {
      const saved = loadProfile();
      const [name, setName]   = React.useState(saved.name  || "");
      const [p5k,   setP5k]   = React.useState(saved.p5k   || "");
      const [p10k,  setP10k]  = React.useState(saved.p10k  || "");
      const [phalf, setPhalf] = React.useState(saved.phalf || "");
      const [pmar,  setPmar]  = React.useState(saved.pmar  || "");

      function handleApply() {
        const profile = { ...saved, name, p5k, p10k, phalf, pmar };
        saveProfile(profile);
        onApply(profile);
        onClose();
      }
      const fields = [
        { label:"Jméno / přezdívka", val:name, set:setName, placeholder:"David Vašíček", isText:true },
        { label:"💨 OR 5 km (min:ss)", val:p5k, set:setP5k, placeholder:"3:30" },
        { label:"🏃 OR 10 km (min:ss)", val:p10k, set:setP10k, placeholder:"3:15" },
        { label:"🥈 OR půlmaraton (min:ss)", val:phalf, set:setPhalf, placeholder:"3:05" },
        { label:"🏅 OR maraton (min:ss)", val:pmar, set:setPmar, placeholder:"3:18" },
      ];
      return (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal-box">
            <button className="modal-close" onClick={onClose}>✕</button>
            <h2>👤 Rychlá úprava profilu</h2>
            <div className="sub">Pro více možností přejdi na záložku 👤 Profil</div>
            {fields.map((f,i) => (
              <div key={i} className="profile-field">
                <label>{f.label}</label>
                <input type="text" value={f.val} placeholder={f.placeholder} onChange={e=>f.set(e.target.value)} />
              </div>
            ))}
            <button className="profile-apply" onClick={handleApply}>💾 Uložit a použít</button>
            <div style={{marginTop:12,fontSize:11,color:"#444",textAlign:"center",lineHeight:1.6}}>Data se ukládají jen v tvém prohlížeči.</div>
          </div>
        </div>
      );
    }

    // ── SectionTitle — reusable section header ────────────────────────────────
    function SectionTitle({ ico, txt }) {
      return (
        <div style={{display:'flex',alignItems:'center',gap:8,margin:'24px 0 14px'}}>
          <span style={{fontSize:18}}>{ico}</span>
          <span className="profil-section-title" style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:16,letterSpacing:2,textTransform:'uppercase'}}>{txt}</span>
          <div style={{flex:1,height:1,background:'rgba(128,128,128,.2)',marginLeft:4}}/>
        </div>
      );
    }

    // ── ProfilTab — full profile hub ─────────────────────────────────────────
    function ProfilTab({ onApply }) {
      const CD_KEY = 'tymdejvid_countdowns';
      const ICONS  = ['🏆','🏃','🎽','🏅','🎯','🎂','💍','❤️','🌍','✈️','🎓','🎉','🏠','💪','🌙','⭐'];

      // Profile state
      const initP = loadProfile();
      const [name,      setName]      = React.useState(initP.name      || '');
      const [gender,    setGender]    = React.useState(initP.gender    || 'men');
      const [birthDate, setBirthDate] = React.useState(initP.birthDate || '');
      const [p5k,       setP5k]       = React.useState(initP.p5k       || '');
      const [p10k,      setP10k]      = React.useState(initP.p10k      || '');
      const [phalf,     setPhalf]     = React.useState(initP.phalf     || '');
      const [pmar,      setPmar]      = React.useState(initP.pmar      || '');
      const [threshold, setThreshold] = React.useState(initP.threshold || '');
      const [longRun,   setLongRun]   = React.useState(initP.longRun   || '');
      const [easy,      setEasy]      = React.useState(initP.easy      || '');
      const [footCm,    setFootCm]    = React.useState(initP.footCm    || 26.5);
      const [terrain,   setTerrain]   = React.useState(initP.terrain   || 'road');
      const [note,      setNote]      = React.useState(initP.note      || '');
      const [saved,     setSaved]     = React.useState(false);

      // Events state
      const [events,   setEvents]   = React.useState(() => { try { return JSON.parse(localStorage.getItem(CD_KEY) || '[]'); } catch(e) { return []; } });
      const [showAdd,  setShowAdd]  = React.useState(false);
      const [editId,   setEditId]   = React.useState(null);
      const [evName,   setEvName]   = React.useState('');
      const [evDate,   setEvDate]   = React.useState('');
      const [evTime,   setEvTime]   = React.useState('00:00');
      const [evIcon,   setEvIcon]   = React.useState('🏆');
      const [evDir,    setEvDir]    = React.useState('future');

      const [now, setNow] = React.useState(Date.now());
      React.useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);

      // ─── helpers ───
      function paceToSec(str) {
        if (!str) return null;
        const p = str.split(':').map(Number);
        if (p.length !== 2 || isNaN(p[0]) || isNaN(p[1])) return null;
        return p[0] * 60 + p[1];
      }
      function toHMS(sec) {
        if (!sec) return '—';
        const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.round(sec%60);
        return h > 0 ? h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0') : m+':'+String(s).padStart(2,'0');
      }
      function getDiff(iso, dir) {
        const target = new Date(iso).getTime();
        const diff   = dir === 'future' ? target - now : now - target;
        if (diff < 0) return null;
        const totalSec = Math.floor(diff / 1000);
        return { days: Math.floor(totalSec/86400), hours: Math.floor((totalSec%86400)/3600), mins: Math.floor((totalSec%3600)/60), secs: totalSec%60, totalSec };
      }
      function fmtEventDate(iso) {
        return new Date(iso).toLocaleDateString('cs-CZ', { day:'numeric', month:'long', year:'numeric' });
      }
      function saveEvents(arr) {
        setEvents(arr);
        try { localStorage.setItem(CD_KEY, JSON.stringify(arr)); } catch(e) {}
      }
      function resetEvForm() { setEvName(''); setEvDate(''); setEvTime('00:00'); setEvIcon('🏆'); setEvDir('future'); setEditId(null); setShowAdd(false); }
      function handleEvSave() {
        if (!evName.trim() || !evDate) return;
        const iso = evDate + 'T' + evTime + ':00';
        if (editId) {
          saveEvents(events.map(e => e.id === editId ? {...e, name:evName.trim(), iso, icon:evIcon, dir:evDir} : e));
        } else {
          saveEvents([...events, { id: Date.now(), name: evName.trim(), iso, icon: evIcon, dir: evDir }]);
        }
        resetEvForm();
      }
      function startEditEv(ev) {
        setEditId(ev.id); setEvName(ev.name); setEvDate(ev.iso.slice(0,10));
        setEvTime(ev.iso.slice(11,16)); setEvIcon(ev.icon); setEvDir(ev.dir || 'future');
        setShowAdd(true);
      }

      // ─── profile save ───
      function handleSave() {
        const profile = { name, gender, birthDate, p5k, p10k, phalf, pmar, threshold, longRun, easy, footCm, terrain, note };
        saveProfile(profile);
        if (birthDate) {
          const existing = events;
          const hasBirth = existing.some(e => e.id === 'birthday');
          if (!hasBirth) {
            const updated = [{ id: 'birthday', name: (name||'Já') + ' — na světě', iso: birthDate + 'T00:00:00', icon: '🎂', dir: 'past' }, ...existing];
            saveEvents(updated);
          }
        }
        if (onApply) onApply(profile);
        setSaved(true);
        setTimeout(() => setSaved(false), 2500);
      }

      // ─── computed ───
      const daysAlive = birthDate ? Math.floor((now - new Date(birthDate).getTime()) / 86400000) : null;
      const age       = birthDate ? Math.floor((now - new Date(birthDate).getTime()) / (365.25*86400000)) : null;
      const reserve   = terrain === 'road' ? 1.0 : 1.5;
      const needed    = footCm + reserve;
      const shoeTable = gender === 'men' ? SHOE_MEN : SHOE_WOMEN;
      const recShoe   = shoeTable.find(r => r.cm >= needed) || shoeTable[shoeTable.length - 1];

      const paceRaces = [
        { label:'5 km',       val:p5k,   km:5,       icon:'💨', set:setP5k,   ph:'3:30' },
        { label:'10 km',      val:p10k,  km:10,      icon:'🏃', set:setP10k,  ph:'3:15' },
        { label:'Půlmaraton', val:phalf, km:21.0975, icon:'🥈', set:setPhalf, ph:'3:05' },
        { label:'Maraton',    val:pmar,  km:42.195,  icon:'🏅', set:setPmar,  ph:'3:18' },
      ];
      const paceTrain = [
        { label:'Threshold', val:threshold, set:setThreshold, icon:'🔥', ph:'3:45' },
        { label:'Long run',  val:longRun,   set:setLongRun,   icon:'🌿', ph:'4:30' },
        { label:'Easy',      val:easy,      set:setEasy,       icon:'😌', ph:'5:00' },
      ];

      // ─── style helpers ───
      const iStyle = 'profil-input';
      const SI = { width:'100%', boxSizing:'border-box', borderRadius:10, padding:'10px 12px', fontSize:14, outline:'none' };
      const lbl = { fontSize:11, letterSpacing:1.5, textTransform:'uppercase', opacity:.5, marginBottom:6, display:'block', fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700 };

      return (
        <div style={{padding:'20px 16px 100px', maxWidth:520, margin:'0 auto'}}>

          {/* ── HEADER CARD ── */}
          <div className="profil-header" style={{borderRadius:16,padding:'20px 16px',marginBottom:8,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:-20,right:-20,fontSize:80,opacity:.05,userSelect:'none'}}>🏃</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:32,letterSpacing:2,color:'var(--accent)',marginBottom:2}}>
              {name || 'PROFIL BĚŽCE'}
            </div>
            {age !== null && (
              <div style={{fontSize:13,opacity:.55,marginBottom:10}}>{age} let · {daysAlive.toLocaleString('cs-CZ')} dní na světě</div>
            )}
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8}}>
              {paceRaces.filter(r=>r.val).map(r => {
                const sec = paceToSec(r.val);
                return (
                  <div key={r.label} className="profil-stat-box" style={{borderRadius:10,padding:'8px 12px',textAlign:'center',minWidth:72}}>
                    <div style={{fontSize:9,opacity:.5,letterSpacing:1.5,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,textTransform:'uppercase',marginBottom:2}}>{r.label}</div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,color:'var(--accent)'}}>{r.val}</div>
                    {sec && <div style={{fontSize:9,opacity:.4,marginTop:1}}>{toHMS(sec*r.km)}</div>}
                  </div>
                );
              })}
              {recShoe && footCm && (
                <div className="profil-stat-box" style={{borderRadius:10,padding:'8px 12px',textAlign:'center',minWidth:72}}>
                  <div style={{fontSize:9,opacity:.5,letterSpacing:1.5,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,textTransform:'uppercase',marginBottom:2}}>BOTY EU</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,color:'var(--accent)'}}>{recShoe.eu}</div>
                  <div style={{fontSize:9,opacity:.4,marginTop:1}}>{footCm} cm</div>
                </div>
              )}
            </div>
          </div>

          {saved && (
            <div style={{background:'rgba(76,255,0,.12)',border:'1px solid rgba(76,255,0,.3)',borderRadius:10,padding:'10px 14px',marginBottom:12,textAlign:'center',fontWeight:700,color:'var(--accent)',fontSize:13}}>
              ✅ Profil uložen!
            </div>
          )}

          {/* ── OSOBNÍ INFO ── */}
          <SectionTitle ico="👤" txt="Osobní info" />
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <label style={lbl}>Jméno / přezdívka</label>
              <input className={iStyle} style={SI} value={name} onChange={e=>setName(e.target.value)} placeholder="David Vašíček" />
            </div>
            <div style={{display:'flex',gap:10}}>
              {[['men','👨 Muž'],['women','👩 Žena']].map(([v,l])=>(
                <button key={v} className={'btn'+(gender===v?' on':'')} onClick={()=>setGender(v)}
                  style={{flex:1,padding:'10px 0',fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>{l}</button>
              ))}
            </div>
            <div>
              <label style={lbl}>Datum narození</label>
              <input type="date" className={iStyle} style={SI} value={birthDate} onChange={e=>setBirthDate(e.target.value)} />
              {birthDate && daysAlive !== null && (
                <div className="profil-tip" style={{fontSize:11,marginTop:6,padding:'8px 12px',borderRadius:8,lineHeight:1.6}}>
                  🎂 <strong>{age} let</strong> · <strong>{daysAlive.toLocaleString('cs-CZ')} dní</strong> · {(daysAlive*24).toLocaleString('cs-CZ')} hodin na světě
                </div>
              )}
            </div>
            <div>
              <label style={lbl}>Poznámka / cíl sezóny</label>
              <input className={iStyle} style={SI} value={note} onChange={e=>setNote(e.target.value)} placeholder="Maraton pod 3h, jarní sezóna 2026…" />
            </div>
          </div>

          {/* ── OSOBNÍ REKORDY ── */}
          <SectionTitle ico="🏅" txt="Osobní rekordy" />
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {paceRaces.map(r => (
              <div key={r.label}>
                <label style={lbl}>{r.icon} {r.label}</label>
                <input className={iStyle} style={SI} value={r.val} onChange={e=>r.set(e.target.value)} placeholder={r.ph} />
                {r.val && paceToSec(r.val) && (
                  <div style={{fontSize:10,opacity:.4,marginTop:3,paddingLeft:2}}>{toHMS(paceToSec(r.val)*r.km)}</div>
                )}
              </div>
            ))}
          </div>

          {/* ── TRÉNINKOVÁ TEMPA ── */}
          <SectionTitle ico="🔥" txt="Tréninková tempa" />
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:6}}>
            {paceTrain.map(r => (
              <div key={r.label}>
                <label style={lbl}>{r.icon} {r.label}</label>
                <input className={iStyle} style={SI} value={r.val} onChange={e=>r.set(e.target.value)} placeholder={r.ph} />
              </div>
            ))}
          </div>
          <div style={{fontSize:11,opacity:.35,paddingLeft:2}}>Propíše se do záložky % Tempa.</div>

          {/* ── BOTY ── */}
          <SectionTitle ico="👞" txt="Velikost bot" />
          <div style={{display:'flex',gap:10,marginBottom:12}}>
            {[['road','🏙 Silnice +1 cm'],['trail','⛰ Terén +1,5 cm']].map(([v,l])=>(

    function ShareModal({ onClose, pm, ps, label }) {
      const [status, setStatus] = React.useState("");
      const refSec = pm * 60 + ps;

      async function doShare() {
        setStatus("Generuji...");
        try {
          const el = document.getElementById("share-card-inner");
          const canvas = await html2canvas(el, { scale:2, backgroundColor:"#0d0d0d", useCORS:true });
          const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
          if (navigator.share && navigator.canShare && navigator.canShare({ files:[new File([blob],"bk.png",{type:"image/png"})] })) {
            await navigator.share({ files:[new File([blob],"bk.png",{type:"image/png"})], title:"Moje tempo" });
            setStatus("Sdíleno!");
          } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "tymdejvid_tempo.png"; a.click();
            URL.revokeObjectURL(url);
            setStatus("Staženo!");
          }
        } catch(e) { setStatus("Chyba: " + e.message); }
      }

      async function copyLink() {
        const url = "https://david-vas.github.io/Bezecka-kalkulacka/";
        try { await navigator.clipboard.writeText(url); setStatus("Odkaz zkopírován!"); }
        catch(e) { setStatus("Nepodařilo se zkopírovat"); }
      }

      const lines = [
        { l:"Tempo", v: fmtPace(refSec) + " min/km" },
        { l:"Rychlost", v: (3600/refSec).toFixed(2) + " km/h" },
        { l:"Maraton", v: toHMS(refSec * 42.195) },
        { l:"Půlmaraton", v: toHMS(refSec * 21.0975) },
        { l:"10 km", v: toHMS(refSec * 10) },
        { l:"5 km", v: toHMS(refSec * 5) },
      ];

      return (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal-box">
            <button className="modal-close" onClick={onClose}>✕</button>
            <h2>📤 Sdílet výsledek</h2>
            <div className="sub">{label || "Aktuální tempo"}</div>

            {/* Share card preview */}
            <div id="share-card-inner" style={{background:"#0d0d0d",borderRadius:14,padding:"28px 24px",margin:"16px 0",border:"1px solid #1c1c1c"}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:11,color:"#4cff00",letterSpacing:"3px",marginBottom:12,textTransform:"uppercase"}}>#TýmDejvid · Běžecká kalkulačka</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:300,fontSize:72,color:"#4cff00",lineHeight:.9,letterSpacing:"-2px"}}>
                {fmtPace(refSec)}

              </div>
              <div style={{height:1,background:"#1c1c1c",margin:"16px 0"}}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px"}}>
                {lines.slice(2).map((l,i)=>(
                  <div key={i}>
                    <div style={{fontSize:9,color:"#555",letterSpacing:"1px",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{l.l}</div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:20,color:"#e8e8e8"}}>{l.v}</div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:16,fontSize:10,color:"#333",letterSpacing:"1px"}}>davidvas.cz/bezecka-kalkulacka</div>
            </div>

            <div className="share-actions">

    // ─── COUNTDOWN TAB ────────────────────────────────────────────────────────
    function CountdownTab() {
      const LS_KEY = 'tymdejvid_countdowns';
      const [events, setEvents] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch(e) { return []; }
      });
      const [now, setNow] = React.useState(Date.now());
      const [showAdd, setShowAdd] = React.useState(false);
      const [newName, setNewName] = React.useState('');
      const [newDate, setNewDate] = React.useState('');
      const [newTime, setNewTime] = React.useState('00:00');
      const [newIcon, setNewIcon] = React.useState('🏆');
      const [newDir, setNewDir] = React.useState('future'); // future = countdown, past = since
      const [editId, setEditId] = React.useState(null);

      React.useEffect(() => {
        const t = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(t);
      }, []);

      function saveEvents(arr) {
        setEvents(arr);
        localStorage.setItem(LS_KEY, JSON.stringify(arr));
      }

      function handleSave() {
        if (!newName.trim() || !newDate) return;
        const iso = newDate + 'T' + newTime + ':00';
        if (editId) {
          saveEvents(events.map(e => e.id === editId ? {...e, name:newName.trim(), iso, icon:newIcon, dir:newDir} : e));
          setEditId(null);
        } else {
          saveEvents([...events, { id: Date.now(), name: newName.trim(), iso, icon: newIcon, dir: newDir }]);
        }
        setNewName(''); setNewDate(''); setNewTime('00:00'); setNewIcon('🏆'); setNewDir('future');
        setShowAdd(false);
      }

      function startEdit(ev) {
        setEditId(ev.id);
        setNewName(ev.name);
        setNewDate(ev.iso.slice(0,10));
        setNewTime(ev.iso.slice(11,16));
        setNewIcon(ev.icon);
        setNewDir(ev.dir || 'future');
        setShowAdd(true);
      }

      function getDiff(iso, dir) {
        const target = new Date(iso).getTime();
        const diff = dir === 'future' ? target - now : now - target;
        if (diff < 0) return null;
        const totalSec = Math.floor(diff / 1000);
        const days  = Math.floor(totalSec / 86400);
        const hours = Math.floor((totalSec % 86400) / 3600);
        const mins  = Math.floor((totalSec % 3600) / 60);
        const secs  = totalSec % 60;
        return { days, hours, mins, secs, totalSec };
      }

      function fmtDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('cs-CZ', { day:'numeric', month:'long', year:'numeric' });
      }

      const accentCol = '#4cff00';
      const ICONS = ['🏆','🏃','🎽','🏅','🎯','🎂','💍','❤️','🌍','✈️','🎓','🎉','🏠','💪','🌙','⭐'];

      const isPast = (ev) => {
        const target = new Date(ev.iso).getTime();
        return (ev.dir === 'future' ? target - now : now - target) < 0;
      };

      return (
        <div style={{padding:'24px 16px 100px', maxWidth:520, margin:'0 auto'}}>
          <div className="pg-h" style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:28,letterSpacing:2,marginBottom:4}}>ODPOČET</div>
          <div className="pg-s" style={{fontSize:13,marginBottom:20,opacity:.7}}>Závody, výročí, narozeniny — cokoliv. Živý odpočet i čas od události.</div>

          {/* ADD / EDIT FORM */}
          {showAdd ? (
            <div className="card" style={{marginBottom:20,padding:'20px 16px'}}>
              <div style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',opacity:.5,marginBottom:14,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>
                {editId ? 'UPRAVIT UDÁLOST' : 'NOVÁ UDÁLOST'}
              </div>

              {/* Icon picker */}
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
                {ICONS.map(ic => (
                  <button key={ic} onClick={()=>setNewIcon(ic)}
                    style={{width:36,height:36,borderRadius:8,border: ic===newIcon?`2px solid ${accentCol}`:'1px solid rgba(255,255,255,.12)',background: ic===newIcon?'rgba(76,255,0,.1)':'rgba(255,255,255,.04)',fontSize:18,cursor:'pointer'}}>
                    {ic}
                  </button>
                ))}
              </div>

              {/* Name */}
              <input
                placeholder="Název události (např. Pražský půlmaraton)"
                value={newName} onChange={e=>setNewName(e.target.value)}
                style={{width:'100%',boxSizing:'border-box',background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:'10px 12px',fontSize:14,color:'#fff',marginBottom:10,outline:'none'}}
              />

              {/* Date + time */}
              <div style={{display:'flex',gap:10,marginBottom:10}}>
                <input type="date" value={newDate} onChange={e=>setNewDate(e.target.value)}
                  style={{flex:2,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:'10px 12px',fontSize:14,color:'#fff',outline:'none'}} />
                <input type="time" value={newTime} onChange={e=>setNewTime(e.target.value)}
                  style={{flex:1,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:'10px 12px',fontSize:14,color:'#fff',outline:'none'}} />
              </div>

              {/* Direction */}
              <div style={{display:'flex',gap:8,marginBottom:16}}>
                {[['future','⏳ Odpočet do'],['past','⏱ Čas od']].map(([v,l])=>(
                  <button key={v} onClick={()=>setNewDir(v)}
                    className={`btn${newDir===v?' on':''}`}
                    style={{flex:1,padding:'9px 0',fontSize:12,fontWeight:700,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>
                    {l}
                  </button>
                ))}
              </div>

              <div style={{display:'flex',gap:8}}>
                <button className="btn on" onClick={handleSave}
                  style={{flex:2,padding:'11px 0',fontSize:13,fontWeight:700,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>
                  {editId ? '💾 Uložit' : '✅ Přidat'}
                </button>
                <button className="btn" onClick={()=>{setShowAdd(false);setEditId(null);setNewName('');setNewDate('');}}
                  style={{flex:1,padding:'11px 0',fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif"}}>
                  Zrušit
                </button>
              </div>
            </div>
          ) : (
            <button className="btn on" onClick={()=>setShowAdd(true)}
              style={{width:'100%',padding:'13px 0',fontSize:14,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',fontFamily:"'Barlow Condensed',sans-serif",marginBottom:20}}>
              + Přidat událost
            </button>
          )}

          {/* EVENT CARDS */}
          {events.length === 0 && !showAdd && (
            <div style={{textAlign:'center',opacity:.35,padding:'40px 0',fontSize:14}}>
              Zatím žádné události.<br/>Přidej svůj první závod nebo výročí 👆
            </div>
          )}

          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {events.map(ev => {
              const diff = getDiff(ev.iso, ev.dir || 'future');
              const done = diff === null;
              const isFuture = (ev.dir || 'future') === 'future';
              return (
                <div key={ev.id} style={{
                  borderRadius:14,
                  border: done ? '1px solid rgba(255,255,255,.1)' : `1px solid ${isFuture ? 'rgba(76,255,0,.25)' : 'rgba(64,160,255,.25)'}`,
                  background: done ? 'rgba(255,255,255,.03)' : isFuture ? 'rgba(76,255,0,.05)' : 'rgba(64,160,255,.05)',
                  padding:'16px',
                  opacity: done ? .5 : 1
                }}>
                  {/* Header */}
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:done?4:12}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <span style={{fontSize:24}}>{ev.icon}</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:15,lineHeight:1.2}}>{ev.name}</div>
                        <div style={{fontSize:11,opacity:.5,marginTop:2}}>{isFuture ? '⏳' : '⏱'} {fmtDate(ev.iso)}</div>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={()=>startEdit(ev)} style={{width:30,height:30,borderRadius:8,border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.04)',cursor:'pointer',fontSize:14,color:'#aaa'}}>✏️</button>
                      <button onClick={()=>saveEvents(events.filter(e=>e.id!==ev.id))} style={{width:30,height:30,borderRadius:8,border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.04)',cursor:'pointer',fontSize:14,color:'#aaa'}}>🗑</button>
                    </div>
                  </div>

                  {/* Countdown / since display */}
                  {done ? (
                    <div style={{fontSize:13,opacity:.6,fontStyle:'italic'}}>
                      {isFuture ? '✅ Hotovo!' : '⏰ Ještě nenastalo'}
                    </div>
                  ) : (
                    <>
                      {/* Big days */}
                      <div style={{textAlign:'center',marginBottom:10}}>
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:64,lineHeight:1,color: isFuture ? accentCol : '#40a0ff'}}>
                          {diff.days}
                        </span>
                        <span style={{fontSize:18,opacity:.5,marginLeft:6,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>
                          {diff.days === 1 ? 'den' : diff.days < 5 ? 'dny' : 'dní'}
                        </span>
                      </div>

                      {/* h m s */}
                      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                        {[[diff.hours,'hod'],[diff.mins,'min'],[diff.secs,'sek']].map(([val,lbl])=>(
                          <div key={lbl} style={{flex:1,textAlign:'center',background:'rgba(255,255,255,.05)',borderRadius:10,padding:'10px 4px'}}>
                            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:28,lineHeight:1,color: isFuture ? accentCol : '#40a0ff'}}>
                              {String(val).padStart(2,'0')}
                            </div>
                            <div style={{fontSize:10,opacity:.45,letterSpacing:1,marginTop:2}}>{lbl}</div>
                          </div>
                        ))}
                      </div>

                      {/* total context */}
                      <div style={{marginTop:10,fontSize:11,opacity:.4,textAlign:'center'}}>
                        celkem {diff.totalSec > 86400*30
                          ? `${Math.floor(diff.days/7)} týdnů a ${diff.days%7} dní`
                          : `${diff.days} dní, ${diff.hours} hod, ${diff.mins} min`}
                        {' · '}celkem {diff.totalSec.toLocaleString('cs-CZ')} sekund
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }


    const TABS = [
      { id:"profil",  label:"👤\nProfil",      tip:"Tvůj profil · OR · tempa · boty · vše na jednom místě" },
      { id:"goal",    label:"🎯\nCílový čas",  tip:"Zadej cíl a vzdálenost → zjisti tempo" },

      { id:"races",   label:"🏆\nZávody",      tip:"Závodní predikce z tempa nebo výsledku" },
      { id:"zones",   label:"📊\nZóny TP",     tip:"Tréninkové zóny dle prahového tempa" },

    ];

    function App() {
      const [tab, setTab] = useState("goal");
      const [showMore, setShowMore] = useState(false);
      const [pm, setPm]   = useState(3);
      const [ps, setPs]   = useState(20);
      const [dark, setDark] = useState(true);
      const [urlAthleteName, setUrlAthleteName] = useState(() => {
        try { return new URLSearchParams(window.location.search).get('name') || null; } catch(e){ return null; }
      });
      // GoalTab persistent state
      const [gH,  setGH]  = useState(1);
      const [gM,  setGM]  = useState(36);
      const [gS,  setGS]  = useState(0);
      const [didx, setDidx] = useState(4);
      const [customKm, setCustomKm] = useState(10);
      const [splitEvery, setSplitEvery] = useState(1);
      const [splitType, setSplitType] = useState("even");
      const [splitPct, setSplitPct] = useState(1);
      // Modal state
      const [showProfile,  setShowProfile]  = useState(false);
      const [showShare,    setShowShare]    = useState(false);
      const [showEmbed,    setShowEmbed]    = useState(false);
      const [showAthletes, setShowAthletes] = useState(false);
      // Active athlete
      const [activeAthId, setActiveAthId] = useState(() => loadActiveAthId());
      const [athletesVer, setAthletesVer] = useState(0); // bump to re-render switcher

      // Load profile from localStorage on mount
      React.useEffect(() => {
        // 1. Check URL parameters first (highest priority)
        const urlParams = new URLSearchParams(window.location.search);
        const urlPmar  = urlParams.get('pmar');
        const urlPhalf = urlParams.get('phalf');
        const urlP10k  = urlParams.get('p10k');
        const urlP5k   = urlParams.get('p5k');
        const urlName  = urlParams.get('name');
        const urlTab   = urlParams.get('tab');
        // Pick best available pace from URL: maraton > půlmaraton > 10k > 5k
        const urlBestPace = urlPmar || urlPhalf || urlP10k || urlP5k;
        if (urlBestPace) {
          const p = parsePaceStr(urlBestPace);
          if (p) { setPm(p.m); setPs(p.s); }
          // Store URL params as a temporary "athlete" in profile so PctTab presets work
          const tempProfile = {};
          if (urlPmar)  tempProfile.pmar  = urlPmar;
          if (urlPhalf) tempProfile.phalf = urlPhalf;
          if (urlP10k)  tempProfile.p10k  = urlP10k;
          if (urlP5k)   tempProfile.p5k   = urlP5k;
          if (urlName)  tempProfile.name  = urlName;
          if (Object.keys(tempProfile).length > 0) {
            try { localStorage.setItem('tymdejvid_url_athlete', JSON.stringify(tempProfile)); } catch(e){}
          }
          if (urlTab) setTab(urlTab);
          return; // URL params override everything else
        }
        // 2. Try active athlete, then own profile
        const athId = loadActiveAthId();
        if (athId) {
          const aths = loadAthletes();
          const a = aths.find(x => x.id === athId);
          if (a && a.pmar) { const p = parsePaceStr(a.pmar); if (p) { setPm(p.m); setPs(p.s); } return; }
        }
        const p = loadProfile();
        if (p.pmar) { const parsed = parsePaceStr(p.pmar); if (parsed) { setPm(parsed.m); setPs(parsed.s); } }
      }, []);

      function applyAthleteOrProfile(a) {
        // a = athlete object or null (= own profile)
        if (a) {
          const id = a.id;
          setActiveAthId(id);
          saveActiveAthId(id);
          setAthletesVer(v => v+1);
          const paceStr = a.pmar || a.phalf || a.p10k || a.p5k;
          if (paceStr) { const p = parsePaceStr(paceStr); if (p) { setPm(p.m); setPs(p.s); } }
        } else {
          setActiveAthId(null);
          saveActiveAthId(null);
          setAthletesVer(v => v+1);
        }
      }

      function handleProfileApply(p) {
        setActiveAthId(null);
