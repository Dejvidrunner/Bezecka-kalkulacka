    .hdr { display:flex; align-items:center; gap:14px; padding:0 24px; height:58px; background:#111; border-bottom:1px solid #1c1c1c; position:sticky; top:0; z-index:50; }
    .hdr-badge { width:32px; height:32px; border-radius:7px; background:#4cff00; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:14px; color:#0d0d0d; }
    .hdr-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:19px; letter-spacing:1px; }
    .hdr-sub { font-size:10px; color:#fff; letter-spacing:2px; text-transform:uppercase; margin-top:-2px; }
    .tabs { display:flex; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:20px; padding:0; position:fixed; bottom:16px; left:12px; right:12px; z-index:50; box-shadow: 0 8px 40px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.04); }
    .tab { flex:1; padding:14px 4px 12px; background:none; border:none; border-top:3px solid transparent; display:flex; flex-direction:column; align-items:center; gap:5px; line-height:1; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#aaa; cursor:pointer; white-space:nowrap; transition:color .15s,border-color .15s; }
    .tab:hover { color:#ccc; }
    .tab.on { color:#4cff00; border-top-color:#4cff00; background:rgba(76,255,0,.04); }
    .more-menu-overlay { position:fixed; inset:0; z-index:49; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); }
    .more-menu { position:fixed; bottom:90px; left:12px; right:12px; z-index:51; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:20px; padding:20px 16px 16px; box-shadow:0 8px 40px rgba(0,0,0,.8); }
    .more-menu-title { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:#555; margin-bottom:14px; }
    .more-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .more-item { display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 6px; border-radius:14px; border:1px solid rgba(255,255,255,.07); background:rgba(255,255,255,.03); cursor:pointer; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#aaa; transition:all .15s; }
    .more-item:hover { background:rgba(76,255,0,.08); border-color:rgba(76,255,0,.2); color:#ddd; }
    .more-item.on { background:rgba(76,255,0,.1); border-color:rgba(76,255,0,.3); color:#4cff00; }
    body.light .tabs { background:#fff; border-color:#e0e0e0; box-shadow:0 8px 40px rgba(0,0,0,.12); }

    body.light .more-item { background:#f7f7f7; border-color:#e8e8e8; color:#666; }
    body.light .more-item:hover { background:rgba(30,125,0,.08); border-color:rgba(30,125,0,.2); color:#333; }

    .pg { padding:32px 24px 140px; max-width:820px; margin:0 auto; }
    .pg-h { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:28px; letter-spacing:.5px; line-height:1; }
    .pg-s { font-size:11px; color:#fff; letter-spacing:2px; text-transform:uppercase; margin:3px 0 28px; }
    .card { background:#131313; border:1px solid #1c1c1c; border-radius:14px; padding:26px 28px; margin-bottom:14px; }
    .card-lbl { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:#fff; margin-bottom:22px; font-weight:600; }

    .big-display { display:flex; align-items:baseline; gap:0; flex-wrap:wrap; margin-bottom:28px; line-height:1; }

    .big-num.accent { color:#4cff00; }
    .slider-block { margin-bottom:18px; }
    .slider-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .slider-name { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:#fff; }

    input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:2px; border-radius:1px; background:#222; outline:none; cursor:pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:22px; height:22px; border-radius:50%; background:#4cff00; border:3px solid #0d0d0d; box-shadow:0 0 0 1px #4cff00,0 0 14px rgba(76,255,0,.35); cursor:pointer; transition:box-shadow .15s; }
    input[type=range]::-webkit-slider-thumb:hover { box-shadow:0 0 0 1px #4cff00,0 0 22px rgba(76,255,0,.55); }
    input[type=range]::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:#4cff00; border:3px solid #0d0d0d; box-shadow:0 0 0 1px #4cff00,0 0 14px rgba(76,255,0,.35); cursor:pointer; }
    .rgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(148px,1fr)); gap:10px; margin-top:18px; }
    .rbox { background:#181818; border:1px solid #1c1c1c; border-radius:10px; padding:14px; transition:border-color .15s,background .15s; }
    .rbox:hover { border-color:#4cff00; background:rgba(76,255,0,.04); }
    .rbox-lbl { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#fff; margin-bottom:5px; }
    .rbox-val { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:26px; color:#e8e8e8; }

    .race-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:10px; margin-top:16px; }
    .splits-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(108px,1fr)); gap:10px; margin-top:16px; }
    .race-card,.split-card { background:#181818; border:1px solid #1c1c1c; border-radius:10px; padding:14px; transition:border-color .15s; }
    .race-card:hover,.split-card:hover { border-color:#4cff00; }
    .race-dist { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:18px; color:#4cff00; }

    .race-pace { font-size:11px; color:#ccc; letter-spacing:.8px; }
    .split-dist { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#888; margin-bottom:6px; font-family:'Barlow Condensed',sans-serif; font-weight:600; }
    .split-time { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px; color:#e8e8e8; }
    .ztable { width:100%; border-collapse:collapse; }
    .zrow { border-bottom:1px solid #191919; transition:background .12s; }
    .zrow:hover { background:rgba(76,255,0,.03); }
    .zrow td { padding:11px 8px; font-size:13px; }
    .znum { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:20px; width:34px; }
    .zname { color:#fff; font-size:12px; }
    .zpace { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; text-align:right; white-space:nowrap; }

    .btn-grp { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .btn { background:#181818; color:#ccc; border:1px solid #222; border-radius:8px; padding:9px 20px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all .15s; }

    body.light .cadence-tip { background: #f7f7f7 !important; border-color: #e0e0e0 !important; }

    /* Dynamic accent color for light/dark via CSS var */

    .card-lbl span { color: var(--accent) !important; }

    .pg-s { color: #fff; }

    /* ── Profile & modal ── */
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px; }

    /* share overlay */
    .share-preview { background:#181818;border:1px solid #222;border-radius:12px;padding:20px;margin:16px 0;text-align:center; }
    .share-actions { display:flex;gap:10px;flex-wrap:wrap; }
    .share-actions button { flex:1;min-width:120px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#e8e8e8;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;padding:12px;cursor:pointer;transition:all .15s; }
    .share-actions button:hover { border-color:#4cff00;color:#4cff00; }
    .share-actions button.primary { background:#4cff00;color:#0d0d0d;border-color:#4cff00; }
    .share-actions button.primary:hover { opacity:.85; }
    /* embed */
    .embed-code { background:#0d0d0d;border:1px solid #1c1c1c;border-radius:8px;padding:14px;font-family:monospace;font-size:11px;color:#aaa;line-height:1.7;word-break:break-all;margin:12px 0;user-select:all; }
    body.light .embed-code { background:#f0f0f0;border-color:#ddd;color:#444; }
    /* share card for canvas */
    #share-card { position:fixed;left:-9999px;top:0;width:600px;padding:48px;background:#0d0d0d;font-family:'Barlow Condensed',sans-serif; }

    /* ── Athletes ── */
    .ath-switcher { position:relative; scroll-snap-align:start; }
    .ath-switcher-btn { display:flex;align-items:center;gap:8px;background:#181818;border:1px solid #2a2a2a;border-radius:10px;padding:7px 12px;cursor:pointer;transition:all .15s;max-width:160px; }
    .ath-switcher-btn:hover { border-color:#4cff00; }
    .ath-switcher-btn .ath-avatar { width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0; }
    .ath-switcher-btn .ath-name { font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:13px;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px; }
    .ath-switcher-btn .ath-chevron { font-size:10px;color:#555;flex-shrink:0; }
    .ath-dropdown { position:absolute;top:calc(100% + 6px);right:0;background:#181818;border:1px solid #2a2a2a;border-radius:12px;min-width:200px;z-index:200;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5); }
    .ath-drop-item { display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid #1c1c1c; }
    .ath-drop-item:last-child { border-bottom:none; }
    .ath-drop-item:hover { background:#222; }
    .ath-drop-item.active { background:rgba(76,255,0,.07); }
    .ath-drop-item .ath-drop-name { font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:15px;color:#e8e8e8;flex:1; }
    .ath-drop-item .ath-drop-pace { font-size:11px;color:#555;letter-spacing:.5px; }
    .ath-drop-item .ath-drop-tick { color:#4cff00;font-size:14px;margin-left:auto; }
    .ath-drop-manage { display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;background:#131313;font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:12px;color:#888;letter-spacing:1.5px;text-transform:uppercase;transition:color .15s; }
    .ath-drop-manage:hover { color:#4cff00; }
    body.light .ath-switcher-btn { background:#f5f5f5;border-color:#ddd; }
    body.light .ath-dropdown { background:#fff;border-color:#e0e0e0;box-shadow:0 8px 32px rgba(0,0,0,.12); }
    body.light .ath-drop-item:hover { background:#f5f5f5; }
    body.light .ath-drop-item.active { background:rgba(26,122,0,.06); }
    body.light .ath-drop-manage { background:#f8f8f8; }
    body.light .ath-switcher-btn .ath-name { color:#111; }
    /* athletes modal */
    .ath-list { margin-bottom:18px; }
    .ath-list-item { display:flex;align-items:center;gap:12px;padding:12px 14px;background:#181818;border:1px solid #1c1c1c;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border .15s; }
    .ath-list-item:hover { border-color:#333; }
    .ath-list-item.active-ath { border-color:#4cff00;background:rgba(76,255,0,.04); }
    .ath-list-item .ali-avatar { width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0; }
    .ath-list-item .ali-info { flex:1;min-width:0; }
    .ath-list-item .ali-name { font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:17px;color:#e8e8e8; }
    .ath-list-item .ali-paces { font-size:11px;color:#555;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .ath-list-item .ali-actions { display:flex;gap:6px; }
    .ali-btn { background:none;border:1px solid #2a2a2a;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;color:#888;transition:all .15s; }
    .ali-btn:hover { border-color:#4cff00;color:#4cff00; }
    .ali-btn.del:hover { border-color:#ef5350;color:#ef5350; }
    body.light .ath-list-item { background:#f8f8f8;border-color:#e0e0e0; }
    body.light .ath-list-item.active-ath { background:rgba(26,122,0,.05);border-color:#1a7a00; }
    body.light .ath-list-item .ali-name { color:#111; }
    /* emoji picker */
    .emoji-grid { display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 16px; }
    .emoji-opt { width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:8px;border:1px solid #1c1c1c;cursor:pointer;background:#181818;transition:all .12s; }
    .emoji-opt.picked { border-color:#4cff00;background:rgba(76,255,0,.1); }
    .emoji-opt:hover { border-color:#333; }
    .ath-form-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    .ath-add-btn { width:100%;background:none;border:2px dashed #222;border-radius:10px;padding:14px;font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:14px;color:#555;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-bottom:16px; }
    .ath-add-btn:hover { border-color:#4cff00;color:#4cff00; }

  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const p2 = n => String(Math.round(n)).padStart(2, "0");

    function fmtPace(sec) {
      if (!sec || sec <= 0) return "--:--";
      const m = Math.floor(sec / 60);
      const s = Math.round(sec % 60);
      return `${m}:${p2(s)}`;
    }

    function toHMS(s) {
      if (!s || s <= 0) return "--:--";
      const h  = Math.floor(s / 3600);
      const m  = Math.floor((s % 3600) / 60);
      const sc = Math.round(s % 60);
      return h > 0 ? `${h}:${p2(m)}:${p2(sc)}` : `${m}:${p2(sc)}`;
    }

    function riegel(d1, t1, d2) { return t1 * Math.pow(d2 / d1, 1.06); }

    function Slider({ label, value, min, max, step = 1, unit, onChange }) {
      const pct = ((value - min) / (max - min)) * 100;
      const [editing, setEditing] = React.useState(false);
      const [draft, setDraft] = React.useState("");
      return (
        <div className="slider-block">
          <div className="slider-row">
            <span className="slider-name">// {label}</span>
            {editing ? (
              <input
                type="number" min={min} max={max} step={step}
                value={draft} autoFocus
                onChange={e => setDraft(e.target.value)}
                onBlur={() => {
                  const v = Math.min(max, Math.max(min, Number(draft)));
                  if (!isNaN(v)) onChange(v);
                  setEditing(false);
                }}
                onKeyDown={e => {
                  if (e.key === "Enter") { e.target.blur(); }
                  if (e.key === "Escape") setEditing(false);
                }}
                style={{
                  background:"var(--input-bg,#1a1a1a)", border:"1px solid var(--accent)", borderRadius:6,
                  color:"var(--accent)", fontFamily:"'Barlow Condensed',sans-serif",
                  fontWeight:700, fontSize:16, width:72, textAlign:"right",
                  padding:"2px 8px", outline:"none"
                }}
              />
            ) : (
              <span className="slider-val" onClick={() => { setDraft(String(value)); setEditing(true); }}
                style={{cursor:"text", borderBottom:"1px dashed rgba(128,128,128,0.5)", paddingBottom:1}}
                title="Klikni pro ruční zadání ✏️">
                {value} {unit}
              </span>
            )}
          </div>
          <input
            type="range" min={min} max={max} step={step} value={value}
            onChange={e => onChange(Number(e.target.value))}
            style={{ background: `linear-gradient(to right, var(--accent) ${pct}%, ${document.body.classList.contains('light')?'#ddd':'#1e1e1e'} ${pct}%)` }}
          />
        </div>
      );
    }

    function PaceCard({ pm, ps, setPm, setPs, label = "TEMPO (min / km)" }) {
      return (
        <div className="card">
          <div className="card-lbl">// <span>{label}</span></div>
          <div className="big-display">
            <BigEdit value={pm} min={1} max={15} accent onChange={setPm} />
            <span className="big-unit">MIN</span>
            <BigEdit value={ps} min={0} max={59} onChange={setPs} />
            <span className="big-unit">S</span>
          </div>
          <Slider label="MINUTY"  value={pm} min={1} max={15} unit="min" onChange={setPm} />
          <Slider label="SEKUNDY" value={ps} min={0} max={59} unit="s"   onChange={setPs} />
        </div>
      );
    }

    const RACES = [
      { label:"1 km",       dist:1000 },
      { label:"1 míle",     dist:1609.34 },
      { label:"3 km",       dist:3000 },
      { label:"5 km",       dist:5000 },
      { label:"10 km",      dist:10000 },
      { label:"Půlmaraton", dist:21097.5 },
      { label:"Maraton",    dist:42195 },
      { label:"50 km",      dist:50000 },
      { label:"100 km",     dist:100000 },
    ];

    const SPLITS = [
      { label:"100 m",            dist:100 },
      { label:"200 m",            dist:200 },
      { label:"300 m",            dist:300 },
      { label:"400 m",            dist:400 },
      { label:"600 m",            dist:600 },
      { label:"800 m",            dist:800 },
      { label:"1 km",             dist:1000 },
      { label:"1 500 m",          dist:1500 },
      { label:"1 míle",           dist:1609.34 },
      { label:"3 km",             dist:3000 },
      { label:"5 km",             dist:5000 },
      { label:"10 km",            dist:10000 },
      { label:"Půlmaraton",       dist:21097.5 },
      { label:"Maraton",          dist:42195 },
      { label:"25 km",            dist:25000 },
      { label:"50 km",            dist:50000 },
      { label:"100 km",           dist:100000 },
      { label:"100 mil",           dist:160934 },
      { label:"Spartathlon",      dist:246000 },
      { label:"24 hodin",         dist:null },
    ];

    const ZONES = [
      { num:1,  name:"Regenerace",          tip:"Velmi pomalý klus. Aktivní odpočinek po náročném tréninku.", from:"04:38", to:"05:23", color:"#4fc3f7" },
      { num:2,  name:"Volný běh",           tip:"Pohodlné tempo. Základní aerobní vytrvalost, long runy.", from:"04:07", to:"04:38", color:"#29b6f6" },
      { num:3,  name:"Aerobní tempo",       tip:"Konverzační tempo. Budování aerobní základny na dlouhých bězích.", from:"03:42", to:"04:07", color:"#26c6da" },
      { num:4,  name:"Maratonské tempo",    tip:"Rozvoj maratonského tempa. Delší tempové úseky 60–80 minut.", from:"03:33", to:"03:42", color:"#66bb6a" },
      { num:5,  name:"Prahové tempo ⚡",    tip:"Laktátový práh — maximum které udržíš 40–60 minut. Úseky okolo 2 km.", from:"03:20", to:"03:33", color:"#4cff00" },
      { num:6,  name:"Tempo 10 km",         tip:"Mírně nad prahem. Úseky 1–2 km.", from:"03:12", to:"03:20", color:"#d4e157" },
      { num:7,  name:"Tempo 5 km",          tip:"Závodní tempo pětky. Intervalové úseky 600–1000 m s odpočinkem.", from:"03:03", to:"03:12", color:"#ffca28" },
      { num:8,  name:"Tempo 3 km",          tip:"Vysoká intenzita. Intervaly 300–600 m s dostatečným odpočinkem.", from:"02:59", to:"03:03", color:"#ffa726" },
      { num:9,  name:"Tempo 1 km",          tip:"Velmi vysoká intenzita. Krátké úseky 100–300 m.", from:"02:51", to:"02:59", color:"#ef5350" },
      { num:10, name:"Maximální sprint",    tip:"Absolutní maximum. Rovinky a sprinty do 100 m.", from:"02:26", to:"02:51", color:"#b71c1c" },
    ];

    const ZF = [
      [1.4,1.63],[1.24,1.4],[1.115,1.24],[1.07,1.115],[1.0,1.07],
      [0.967,1.0],[0.917,0.967],[0.9,0.917],[0.858,0.9],[0.74,0.858],
    ];

    function ConvertTab({ pm, ps, setPm, setPs }) {
      const tot = pm * 60 + ps;
      const kph = tot ? (3600 / tot).toFixed(2) : "–";
      const mps = tot ? (1000 / tot).toFixed(2) : "–";
      const [kphVal, setKphVal] = useState(14.4);
      const paceRevSec = kphVal > 0 ? 3600 / kphVal : 0;
      return (
        <div>
          <div className="pg-h">TEMPO → RYCHLOST</div>
          <div className="pg-s">Přepočet min/km ↔ km/h</div>
          <PaceCard pm={pm} ps={ps} setPm={setPm} setPs={setPs} label="TEMPO (min / km)" />
          <div className="rgrid">
            <div className="rbox"><div className="rbox-lbl">Rychlost</div><div className="rbox-val g">{kph}<em>km/h</em></div></div>
            <div className="rbox"><div className="rbox-lbl">m/s</div><div className="rbox-val">{mps}<em>m/s</em></div></div>
            <div className="rbox"><div className="rbox-lbl">Tempo / míle</div><div className="rbox-val">{toHMS(tot * 1.60934)}<em>min/mi</em></div></div>
            <div className="rbox"><div className="rbox-lbl">Tempo min/km</div><div className="rbox-val g">{pm}:{p2(ps)}<em>min/km</em></div></div>
          </div>
          <div className="card" style={{marginTop:14}}>
            <div className="card-lbl">// <span>ZPĚT: km/h → tempo</span></div>
            <div className="big-display">
              <span className="big-num accent">{kphVal.toFixed(1)}</span>
              <span className="big-unit">KM/H</span>
            </div>
            <Slider label="RYCHLOST" value={kphVal} min={5} max={30} step={0.1} unit="km/h" onChange={v => setKphVal(parseFloat(parseFloat(v).toFixed(1)))} />
            <div className="divider" />
            <div className="rgrid" style={{marginTop:0}}>
              <div className="rbox"><div className="rbox-lbl">Tempo min/km</div><div className="rbox-val g">{toHMS(paceRevSec)}</div></div>
              <div className="rbox"><div className="rbox-lbl">Tempo min/míle</div><div className="rbox-val">{toHMS(paceRevSec * 1.60934)}</div></div>
            </div>
          </div>
        </div>
      );
    }

    function SplitsTab({ pm, ps, setPm, setPs }) {
      const tot = pm * 60 + ps;
      return (
        <div>
          <div className="pg-h">MEZIČASY & ÚSEKY</div>
          <div className="pg-s">Od 100 m po 24 hodinový běh</div>
          <PaceCard pm={pm} ps={ps} setPm={setPm} setPs={setPs} />
          <div className="splits-grid">
            {SPLITS.map(d => (
              <div className="split-card" key={d.label}>
                <div className="split-dist">{d.label}</div>
                <div className="split-time">
                  {d.dist === null
                    ? (() => { const km = (86400 / tot).toFixed(1); return km + " km"; })()
                    : toHMS(tot * d.dist / 1000)
                  }
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function RacesTab({ pm, ps, setPm, setPs }) {
      const [mode, setMode] = useState("pace");
      const tot = pm * 60 + ps;
      const [ridx, setRidx] = useState(4);
      const [rH, setRH] = useState(0);
      const [rM, setRM] = useState(38);
      const [rS, setRS] = useState(0);
      const [customRaceKm, setCustomRaceKm] = useState(42.195);
      const refSec = rH * 3600 + rM * 60 + rS;

      const RACES_EXTENDED = [
        ...RACES,
        { label:"24 hodin", dist:null },
        { label:"Vlastní", dist:"custom" },
      ];

      return (
        <div>
          <div className="pg-h">ZÁVODNÍ ČASY</div>
          <div className="pg-s">Predikce z tempa nebo Riegelova vzorce</div>
          <div className="btn-grp">
            <button className={`btn${mode==="pace"?" on":""}`}   onClick={()=>setMode("pace")}>Dle tempa</button>
            <button className={`btn${mode==="riegel"?" on":""}`} onClick={()=>setMode("riegel")}>Dle Riegelova vzorce</button>
          </div>
          {mode === "pace" ? (
            <>
              <PaceCard pm={pm} ps={ps} setPm={setPm} setPs={setPs} />
              <div className="race-grid">
                {RACES_EXTENDED.map(d => {
                  let time, pace;
                  if (d.dist === null) {
                    // 24 hodin — show km covered
                    const kmCovered = (86400 / tot).toFixed(1);
                    return (
                      <div className="race-card" key={d.label}>
                        <div className="race-dist">{d.label}</div>
                        <div className="race-time">{kmCovered} km</div>
                        <div className="race-pace">{pm}:{p2(ps)} min/km</div>
                      </div>
                    );
                  } else if (d.dist === "custom") {
                    time = tot * customRaceKm;
                    pace = `${pm}:${p2(ps)}`;
                    return (
                      <div className="race-card" key={d.label} style={{borderColor:"rgba(76,255,0,.3)"}}>
                        <div className="race-dist" style={{fontSize:14}}>{customRaceKm.toFixed(1)} km</div>
                        <div className="race-time">{toHMS(time)}</div>
                        <div className="race-pace">{pace} min/km</div>
                      </div>
                    );
                  } else {
                    time = tot * d.dist / 1000;
                    return (
                      <div className="race-card" key={d.label}>
                        <div className="race-dist">{d.label}</div>
                        <div className="race-time">{toHMS(time)}</div>
                        <div className="race-pace">{pm}:{p2(ps)} min/km</div>
                      </div>
                    );
                  }
                })}
              </div>
              {/* Custom distance input - bottom */}
              <div className="card" style={{marginTop:14}}>
                <div className="card-lbl">// <span>VLASTNÍ VZDÁLENOST</span></div>
                <div className="big-display" style={{marginBottom:8}}>
                  <BigEdit value={customRaceKm} min={0.1} max={1000} step={0.1} decimals={1} accent onChange={v => setCustomRaceKm(parseFloat(v.toFixed(1)))} />
                  <span className="big-unit">KM</span>
                </div>
                <Slider label="VZDÁLENOST" value={customRaceKm} min={0.1} max={200} step={0.1} unit="km" onChange={v => setCustomRaceKm(parseFloat(v.toFixed(1)))} />
                <div style={{marginTop:14,padding:"12px 14px",background:"rgba(76,255,0,.04)",border:"1px solid rgba(76,255,0,.15)",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:12,color:"#888"}}>Čas na {customRaceKm.toFixed(1)} km</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:24,color:"var(--accent)"}}>{tot > 0 ? toHMS(tot * customRaceKm) : "–"}</div>
                </div>
              </div>
            </>
          ) : (
            <div className="card">
              <div className="card-lbl">// <span>REFERENČNÍ VÝSLEDEK</span></div>
              <div style={{marginBottom:20}}>
                <div style={{fontSize:10,letterSpacing:2.5,textTransform:"uppercase",color:"#888",marginBottom:10,fontWeight:600}}>// VZDÁLENOST</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {RACES.map((d,i) => (
                    <button key={d.label} className={`btn${ridx===i?" on":""}`}
                      style={{padding:"6px 12px",fontSize:11}} onClick={()=>setRidx(i)}>{d.label}</button>
                  ))}
                </div>
              </div>
              <div className="big-display">
                <span className="big-num accent">{p2(rH)}</span><span className="big-unit">H</span>
                <span className="big-num">{p2(rM)}</span><span className="big-unit">MIN</span>
                <span className="big-num">{p2(rS)}</span><span className="big-unit">S</span>
              </div>
              <Slider label="HODINY"  value={rH} min={0} max={12} unit="h"   onChange={setRH} />
              <Slider label="MINUTY"  value={rM} min={0} max={59} unit="min" onChange={setRM} />
              <Slider label="SEKUNDY" value={rS} min={0} max={59} unit="s"   onChange={setRS} />
              <div style={{marginTop:10}}><span className="tag">Riegelův vzorec</span><span style={{fontSize:11,color:"#888",marginLeft:8}}>T₂ = T₁ × (D₂/D₁)^1.06</span></div>
              <div className="race-grid" style={{marginTop:16}}>
                {RACES.filter((_,i)=>i!==ridx).map(d => {
                  const pred = riegel(RACES[ridx].dist, refSec, d.dist);
                  const pace = pred / (d.dist / 1000);
                  return (
                    <div className="race-card" key={d.label}>
                      <div className="race-dist">{d.label}</div>
                      <div className="race-time">{toHMS(pred)}</div>
                      <div className="race-pace">{toHMS(pace)} min/km</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    function ZonesTab({ pm, ps, setPm, setPs }) {
      const thr = pm * 60 + ps;
      const dyn = ZONES.map((z, i) => ({
        ...z,
        fromSec: thr * ZF[i][0],
        toSec:   thr * ZF[i][1],
      }));
      return (
        <div>
          <div className="pg-h">TRÉNINKOVÉ ZÓNY</div>
          <div className="pg-s">Dynamické zóny dle tvého prahového tempa</div>

          {/* Vysvětlení prahového tempa */}
          <div className="card" style={{borderColor:"rgba(76,255,0,.15)",marginBottom:14}}>

                {dyn.map((z,i)=>(
                  <tr className="zrow" key={z.num} title={z.tip}>

    function BigEdit({ value, min, max, step = 1, decimals = 0, accent, onChange }) {
      const [editing, setEditing] = React.useState(false);
      const [draft, setDraft] = React.useState("");
      const display = decimals > 0 ? value.toFixed(decimals) : p2(value);
      return editing ? (
        <input
          type="number" min={min} max={max} step={step}
          value={draft} autoFocus
          onChange={e => setDraft(e.target.value)}
          onBlur={() => {
            const v = Math.min(max, Math.max(min, Number(draft)));
            if (!isNaN(v)) onChange(v);
            setEditing(false);
          }}
          onKeyDown={e => {
            if (e.key === "Enter") e.target.blur();
            if (e.key === "Escape") setEditing(false);
          }}
          style={{
            fontFamily:"'Barlow Condensed',sans-serif", fontWeight:300,
            fontSize:88, lineHeight:.92, letterSpacing:-2,
            color: accent ? "#4cff00" : "#f0f0f0",
            background:"transparent", border:"none",
            borderBottom: "2px solid #4cff00",
            outline:"none", width:"2.2ch", padding:0,
            MozAppearance:"textfield"
          }}
        />
      ) : (
        <span
          className={"big-num" + (accent ? " accent" : "")}
          onClick={() => { setDraft(String(value)); setEditing(true); }}
          style={{cursor:"text", borderBottom:"2px solid transparent",
            transition:"border-color .15s"}}
          onMouseEnter={e => e.target.style.borderBottomColor="#4cff00"}
          onMouseLeave={e => e.target.style.borderBottomColor="transparent"}
          title="Klikni pro zadání">
          {display}
        </span>
      );
    }

    const GOAL_DISTS = [
      { label:"1 km",       dist:1000 },
      { label:"3 km",       dist:3000 },
      { label:"5 km",       dist:5000 },
      { label:"10 km",      dist:10000 },
      { label:"Půlmaraton", dist:21097.5 },
      { label:"Maraton",    dist:42195 },
      { label:"Vlastní",    dist:null },
    ];

    function GoalTab({ gH, setGH, gM, setGM, gS, setGS, didx, setDidx, customKm, setCustomKm, splitEvery, setSplitEvery, splitType, setSplitType, splitPct, setSplitPct }) {

      const totalSec = gH * 3600 + gM * 60 + gS;
      const distM    = GOAL_DISTS[didx].dist ?? customKm * 1000;
      const distKm   = distM / 1000;
      const paceSec  = distKm > 0 && totalSec > 0 ? totalSec / distKm : 0;
      const kph      = paceSec > 0 ? (3600 / paceSec).toFixed(2) : "–";

      const checkpoints = [];
      for (let k = splitEvery; k < distKm; k += splitEvery) {
        checkpoints.push(parseFloat(k.toFixed(4)));
      }
      checkpoints.push(parseFloat(distKm.toFixed(4)));

      function segmentPace(segStart, segEnd) {
        if (splitType === "even") return paceSec;
        const pct = splitPct / 100;
        const segMid = (segStart + segEnd) / 2;
        const progress = segMid / distKm;
        const factor = splitType === "negative"
          ? (1 + pct) - progress * (2 * pct)
          : (1 - pct) + progress * (2 * pct);
        return paceSec * factor;
      }

      return (
        <div>
          <div className="pg-h">CÍLOVÝ ČAS</div>
          <div className="pg-s">Zadej čas + vzdálenost → výsledné tempo</div>

          <div className="card">
            <div className="card-lbl">// <span>VZDÁLENOST</span></div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:GOAL_DISTS[didx].dist===null?16:0}}>
              {GOAL_DISTS.map((d,i) => (
                <button key={d.label} className={`btn${didx===i?" on":""}`}
                  style={{padding:"8px 14px",fontSize:12}} onClick={()=>setDidx(i)}>{d.label}</button>
              ))}
            </div>
            {GOAL_DISTS[didx].dist === null && (
              <div style={{marginTop:16}}>
                <div className="big-display">
                  <BigEdit value={customKm} min={0.1} max={200} step={0.1} decimals={1} accent onChange={v => setCustomKm(parseFloat(parseFloat(v).toFixed(1)))} /><span className="big-unit">KM</span>
                </div>
                <Slider label="VZDÁLENOST" value={customKm} min={0.1} max={200} step={0.1} unit="km" onChange={v => setCustomKm(parseFloat(parseFloat(v).toFixed(1)))} />
              </div>
            )}
          </div>

          <div className="card">
            <div className="card-lbl">// <span>CÍLOVÝ ČAS</span></div>
            <div className="big-display">
              <BigEdit value={gH} min={0} max={24} accent onChange={setGH} /><span className="big-unit">H</span>
              <BigEdit value={gM} min={0} max={59} onChange={setGM} /><span className="big-unit">MIN</span>
              <BigEdit value={gS} min={0} max={59} onChange={setGS} /><span className="big-unit">S</span>
            </div>
            <Slider label="HODINY"  value={gH} min={0} max={24} unit="h"   onChange={setGH} />
            <Slider label="MINUTY"  value={gM} min={0} max={59} unit="min" onChange={setGM} />
            <Slider label="SEKUNDY" value={gS} min={0} max={59} unit="s"   onChange={setGS} />
          </div>

          {paceSec > 0 && (
            <>
              <div className="card" style={{border:"1px solid rgba(76,255,0,.25)",background:"rgba(76,255,0,.04)"}}>
                <div className="card-lbl">// <span>VÝSLEDNÉ TEMPO</span></div>
                <div className="big-display" style={{marginBottom:8}}>
                  <span className="big-num accent">{Math.floor(paceSec/60)}</span>
                  <span className="big-unit">MIN</span>
                  <span className="big-num accent">{p2(Math.round(paceSec%60))}</span>
                  <span className="big-unit">S / KM</span>
                </div>
                <div className="rgrid" style={{marginTop:16}}>
                  <div className="rbox"><div className="rbox-lbl">Rychlost</div><div className="rbox-val g">{kph}<em>km/h</em></div></div>
                  <div className="rbox"><div className="rbox-lbl">Vzdálenost</div><div className="rbox-val">{distKm%1===0?distKm:distKm.toFixed(2)}<em>km</em></div></div>
                  <div className="rbox"><div className="rbox-lbl">Cílový čas</div><div className="rbox-val">{toHMS(totalSec)}</div></div>
                  <div className="rbox"><div className="rbox-lbl">Tempo / míle</div><div className="rbox-val">{toHMS(paceSec*1.60934)}<em>min/mi</em></div></div>
                </div>
              </div>

              <div className="card">
                <div className="card-lbl">// <span>NASTAVENÍ MEZIČASŮ</span></div>
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#888",marginBottom:8,fontWeight:600}}>Interval</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button className={`btn${splitEvery===0.4?" on":""}`} style={{padding:"8px 14px"}} onClick={()=>setSplitEvery(0.4)}>každých 400 m</button>
                    {[1,5,10].map(v => (
                      <button key={v} className={`btn${splitEvery===v?" on":""}`}
                        style={{padding:"8px 14px"}} onClick={()=>setSplitEvery(v)}>každých {v} km</button>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#888",marginBottom:8,fontWeight:600}}>Typ rozložení</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button className={`btn${splitType==="even"?" on":""}`}     style={{padding:"8px 14px"}} onClick={()=>setSplitType("even")}>⚡ Even split</button>
                    <button className={`btn${splitType==="negative"?" on":""}`} style={{padding:"8px 14px"}} onClick={()=>setSplitType("negative")}>📈 Negative split</button>
                    <button className={`btn${splitType==="positive"?" on":""}`} style={{padding:"8px 14px"}} onClick={()=>setSplitType("positive")}>📉 Positive split</button>
                  </div>
                  {splitType !== "even" && (
                    <div style={{marginTop:16}}>
                      <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#888",marginBottom:8,fontWeight:600}}>Rozdíl tempa</div>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <input type="range" min={0.5} max={5} step={0.5} value={splitPct}
                          onChange={e=>setSplitPct(Number(e.target.value))}
                          style={{flex:1, background:`linear-gradient(to right, var(--accent) ${(splitPct-0.5)/4.5*100}%, ${document.body.classList.contains('light')?'#ddd':'#1e1e1e'} ${(splitPct-0.5)/4.5*100}%)`}}
                        />
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:20,color:"var(--accent)",minWidth:40,textAlign:"right"}}>{splitPct}%</span>
                      </div>
                      <div style={{fontSize:11,color:"#888",marginTop:6}}>
                        {splitType==="negative"
                          ? `1. polovina o ${splitPct}% pomalejší → 2. polovina o ${splitPct}% rychlejší`
                          : `1. polovina o ${splitPct}% rychlejší → 2. polovina o ${splitPct}% pomalejší`}
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {checkpoints.length > 0 && (
                <div className="card">
                  <div className="card-lbl">// <span>MEZIČASY</span></div>
                  <table className="ztable">
                    <thead>
                      <tr>
                        <td style={{padding:"6px 10px",fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#888",width:80}}>Km</td>
                        <td style={{padding:"6px 10px",fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#888",textAlign:"right"}}>Úsek</td>
                        <td style={{padding:"6px 10px",fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#888",textAlign:"right"}}>Celkem</td>
                        <td style={{padding:"6px 10px",fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#888",textAlign:"right"}}>Tempo</td>
                      </tr>
                    </thead>
                    <tbody>
                      {(() => {
                        let cumSec = 0;
                        let prevKm = 0;
                        return checkpoints.map((km) => {
                          const segKm = km - prevKm;
                          const sp = segmentPace(prevKm, km);
                          const segSec = sp * segKm;
                          cumSec += segSec;
                          const isLast = Math.abs(km - distKm) < 0.001 && distKm % splitEvery !== 0;
                          const label = isLast ? distKm.toFixed(2)+" km" : km+" km";
                          const result = (
                            <tr className="zrow" key={km}>
                              <td style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16}} className="accent">{label}</td>
                              <td style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:17,color:"#e8e8e8",textAlign:"right"}}>{toHMS(segSec)}</td>
                              <td style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:17,color:"#bbb",textAlign:"right"}}>{toHMS(cumSec)}</td>
                              <td style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:14,
                                color: splitType==="even" ? "#888" : (sp < paceSec ? "#4cff00" : "#ef5350"),
                                textAlign:"right"}}>{Math.floor(sp/60)}:{p2(Math.round(sp%60))}</td>
                            </tr>
                          );
                          prevKm = km;
                          return result;
                        });
                      })()}
                    </tbody>
                  </table>
                </div>
              )}
            </>
          )}
        </div>
      );
    }


    function CadenceTab({ pm, ps, setPm, setPs }) {
      const [heightCm, setHeightCm] = useState(175);
      const paceSec = pm * 60 + ps;
      const speedMs = paceSec > 0 ? 1000 / paceSec : 0;
      
      // Formula based on research:
      // Base cadence 162 spm at 3.0 m/s for 175cm runner
      // +6 spm per 1 m/s faster
      // -0.2 spm per cm above 175cm
      const optCadence = Math.round(162 + (speedMs - 3.0) * 6 - (heightCm - 175) * 0.2);
      const minC = optCadence - 8;
      const maxC = optCadence + 8;
      
      // Stride length = distance per step (both feet)
      const strideM = paceSec > 0 ? (speedMs * 60 / optCadence).toFixed(2) : "–";
      
      // Zone description
      const getZone = (c) => {
        if (c < 155) return { label: "Příliš nízká", color: "#ef5350", tip: "Pravděpodobně dochází k přešlapování. Zkus zkrátit krok." };
        if (c < 163) return { label: "Nízká", color: "#ffa726", tip: "Typické pro rekreační tempo. Postupně zvyšuj o 5 kr/min." };
        if (c < 170) return { label: "Dobrá", color: "#ffca28", tip: "Solidní kadence pro mírné tempo. Jsi na dobré cestě." };
        if (c < 178) return { label: "Optimální", color: "#4cff00", tip: "Výborná kadence! Odpovídá tvému tempu a výšce." };
        if (c < 186) return { label: "Vysoká", color: "#4cff00", tip: "Efektivní kadence pro rychlé tempo. Kratší kontakt se zemí." };
        return { label: "Elitní", color: "#4cff00", tip: "Kadence jako závodní elita. Maximální efektivita." };
      };
      const zone = getZone(optCadence);
      const pct = Math.min(100, Math.max(0, (optCadence - 140) / (210 - 140) * 100));

      return (
        <div>
          <div className="pg-h">KADENCE</div>
          <div className="pg-s">Optimální krok dle tempa a výšky</div>

          {/* Height card */}
          <div className="card">
            <div className="card-lbl">// <span>VÝŠKA</span></div>
            <div className="big-display">
              <BigEdit value={heightCm} min={140} max={220} step={1} accent onChange={setHeightCm} />
              <span className="big-unit">CM</span>
            </div>
            <Slider label="VÝŠKA" value={heightCm} min={140} max={220} step={1} unit="cm" onChange={setHeightCm} />
          </div>

          {/* Pace card */}
          <PaceCard pm={pm} ps={ps} setPm={setPm} setPs={setPs} label="TEMPO (min / km)" />

          {/* Result */}
          {paceSec > 0 && (
            <>
              <div className="card" style={{border:"1px solid rgba(76,255,0,.25)",background:"rgba(76,255,0,.04)"}}>
                <div className="card-lbl">// <span>OPTIMÁLNÍ KADENCE</span></div>
                <div className="big-display" style={{marginBottom:8}}>
                  <span className="big-num accent">{optCadence}</span>
                  <span className="big-unit">KR/MIN</span>
                </div>

                {/* Visual bar */}
                <div style={{position:"relative",height:8,background:"#1e1e1e",borderRadius:4,margin:"16px 0 8px",overflow:"hidden"}}>
                  <div style={{
                    position:"absolute",left:0,top:0,bottom:0,
                    width: pct + "%",
                    background:"linear-gradient(to right, #ef5350, #ffa726, #4cff00, #4cff00)",
                    borderRadius:4,
                    transition:"width .3s"
                  }} />
                  <div style={{
                    position:"absolute",top:"50%",
                    left: pct + "%",
                    transform:"translate(-50%,-50%)",
                    width:14,height:14,borderRadius:"50%",
                    background:zone.color,
                    border:"2px solid #0d0d0d",
                    boxShadow:`0 0 10px ${zone.color}88`
                  }} />
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:16}}>
                  <span>140</span><span>175</span><span>210</span>
                </div>

                {/* Zone badge */}
                <div className="cadence-tip" style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:"#111",borderRadius:10,marginBottom:16,border:`1px solid ${zone.color}33`}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:zone.color,flexShrink:0,boxShadow:`0 0 8px ${zone.color}`}} />
                  <div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:16,color:zone.color}}>{zone.label}</div>
                    <div style={{fontSize:12,color:"#888",marginTop:2}}>{zone.tip}</div>
                  </div>
                </div>

                {/* Stats grid */}
                <div className="rgrid" style={{marginTop:0}}>
                  <div className="rbox">
                    <div className="rbox-lbl">Rozsah</div>
                    <div className="rbox-val" style={{fontSize:20}}>{minC}<em style={{fontSize:13,color:"#555",margin:"0 4px"}}>–</em>{maxC}</div>
                    <div style={{fontSize:10,color:"#555",marginTop:3}}>kroků / min</div>
                  </div>
                  <div className="rbox">
                    <div className="rbox-lbl">Délka kroku</div>
                    <div className="rbox-val g">{strideM}<em>m</em></div>
                  </div>
                  <div className="rbox">
                    <div className="rbox-lbl">Rychlost</div>
                    <div className="rbox-val">{(speedMs * 3.6).toFixed(1)}<em>km/h</em></div>
                  </div>
                  <div className="rbox">
                    <div className="rbox-lbl">Kroků / km</div>
                    <div className="rbox-val">{paceSec > 0 ? Math.round(optCadence * paceSec / 60) : "–"}</div>
                  </div>
                </div>
              </div>

              {/* Info card */}
              <div className="card">
                <div className="card-lbl">// <span>JAK NA KADENCI</span></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[
                    {icon:"📈", title:"Zvyšuj pomalu", desc:"Max o 5 kr/min najednou. Tělo potřebuje týdny na adaptaci."},
                    {icon:"🎵", title:"Metronom", desc:"Najdi playlist s BPM odpovídajícím tvé cílové kadenci."},
                    {icon:"⚡", title:"Kratší kontakt", desc:"Vyšší kadence = méně času na zemi = méně nárazů na klouby."},
                    {icon:"🔄", title:"Přirozená volba", desc:"Tvé tělo si samo vybírá nejúspornější kadenci pro dané tempo."},
                  ].map(item => (
                    <div key={item.title} className="cadence-tip" style={{background:"#181818",border:"1px solid #1e1e1e",borderRadius:10,padding:"14px 12px"}}>
                      <div style={{fontSize:20,marginBottom:6}}>{item.icon}</div>
                      <div className="cadence-tip-title" style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,color:"#fff",marginBottom:4}}>{item.title}</div>
                      <div className="cadence-tip-desc" style={{fontSize:12,color:"#666",lineHeight:1.5}}>{item.desc}</div>
                    </div>
                  ))}
                </div>
                <div className="cadence-note" style={{marginTop:14,padding:"10px 14px",background:"#111",borderRadius:8,fontSize:11,color:"#555",lineHeight:1.6}}>
                  Vzorec vychází z vědeckých studií (Heiderscheit et al., Cavanagh & Williams). Kadence závisí na rychlosti (~6 kr/min na 1 m/s), výšce (~0,2 kr/min na 1 cm) a individuální biomechanice.
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // PCT TAB – % tempa, periodizace, volné běhy
    // ─────────────────────────────────────────────
    function paceAtPct(refSec, pct) { return refSec / (pct / 100); }

    const PCT_ZONES = [
      { pct:60, name:"Výklus",              tip:"Po závodě / náročném tréninku. Klus, dýcháš volně.", color:"#4fc3f7" },
      { pct:65, name:"Regenerační klus",    tip:"Aktivní regenerace. Konverzační tempo.", color:"#29b6f6" },
      { pct:70, name:"Volný běh — krátký",  tip:"30–60 min, základní aerobní objem.", color:"#26c6da" },

      { phase:"Březen",   label:"Forma",     volny:73, longrun:84, tempo:93,    int2:97,   int1:100 },

    function PaceSliderMini({ label, pm, ps, setPm, setPs }) {

      return (
        <div className="card" style={{marginBottom:14}}>

            <span className="big-num accent">{p2(pm)}</span>
            <span className="big-unit">MIN</span>
            <span className="big-num">{p2(ps)}</span>

    function PctTab({ pm, ps, setPm, setPs, activeAthId }) {
      const [localPm, setLocalPm] = useState(pm);

      const [activeCol, setActiveCol] = useState(null);

      // Build presets from active athlete or own profile

        let src = {};

          const aths = loadAthletes();
          src = aths.find(a => a.id === activeAthId) || {};

          src = loadProfile();

        function pp(str, fallbackM, fallbackS) {
          if (!str) return { pm: fallbackM, ps: fallbackS };
          const p = parsePaceStr(str);
          return p ? { pm: p.m, ps: p.s } : { pm: fallbackM, ps: fallbackS };
        }
        return [
          { id:"5k",       label:"5 km",       icon:"💨", ...pp(src.p5k,   3, 30) },
          { id:"10k",      label:"10 km",      icon:"🏃", ...pp(src.p10k,  3, 15) },
          { id:"half",     label:"Půlmaraton", icon:"🥈", ...pp(src.phalf, 3,  5) },
          { id:"marathon", label:"Maraton",    icon:"🏅", ...pp(src.pmar,  3, 18) },

            <div className="slider-block">

            })}
          </div>

          {/* Periodizace sezóny — matrix */}
          <div className="card" style={{overflowX:"auto"}}>
            <div className="card-lbl">// <span>Periodizace sezóny</span> · tempa pro jednotlivé typy tréninků</div>
            <div style={{fontSize:11,color:"#555",marginBottom:16,lineHeight:1.7}}>
              Klikni na sloupec pro detail. Ref. tempo = <strong style={{color:"#e8e8e8"}}>{fmtPace(refSec)} min/km</strong>
            </div>

            {/* Column headers */}
            <div style={{display:"grid",gridTemplateColumns:"80px repeat(5, 1fr)",gap:2,marginBottom:6}}>
              <div/>
              {colMeta.map(c=>(
                <div key={c.key}
                  onClick={()=>setActiveCol(activeCol===c.key?null:c.key)}
                  style={{
                    textAlign:"center",padding:"8px 4px",borderRadius:6,cursor:"pointer",
                    background: activeCol===c.key ? `rgba(${c.color==="rgba(76,255,0,1)"?"76,255,0":c.color.replace(/[^\d,]/g,"")}, .12)` : "#181818",
                    border:`1px solid ${activeCol===c.key?c.color:"#1c1c1c"}`,
                    transition:"all .15s"

                  <div style={{fontSize:16}}>{c.icon}</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:10,color: activeCol===c.key?c.color:"#666",letterSpacing:"1px",textTransform:"uppercase",marginTop:2}}>{c.label}</div>
                </div>
              ))}

            {/* Rows */}
            {PCT_SEASON.map((row,ri)=>(
              <div key={ri} style={{display:"grid",gridTemplateColumns:"80px repeat(5, 1fr)",gap:2,marginBottom:2,alignItems:"center"}}>

                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,color:"#888",letterSpacing:"1px"}}>{row.phase}</div>
                  <div style={{fontSize:9,color:"#444",letterSpacing:"1px",textTransform:"uppercase"}}>{row.label}</div>
                </div>
                {colMeta.map(c=>{
                  const pct = row[c.key];
                  const sec = pct ? paceAtPct(refSec, pct) : null;
                  const isActive = activeCol===c.key;
                  return (
                    <div key={c.key} style={{
                      background: isActive ? "rgba(255,255,255,.03)" : "#131313",

                        <div style={{fontSize:14,color:"#2a2a2a"}}>—</div>

            <div style={{marginTop:10,fontSize:10,color:"#333",lineHeight:1.7}}>
              % = podíl ze závodního tempa (rychlost). Intervaly nad 100% = rychlejší než závodní tempo.
            </div>
          </div>

          {/* Volný běh / výklus guide */}
          <div className="card">
            <div className="card-lbl">// <span>Volný běh a výklus</span> · doporučená tempa</div>
            <div style={{fontSize:12,color:"#555",marginBottom:18,lineHeight:1.7}}>
              Nejčastěji zanedbávaná část tréninku. Volný běh a výklus tvoří 70–80 % celkového objemu —
              měly by být <strong style={{color:"#aaa"}}>opravdu pomalé</strong>.
            </div>

            {[
              { icon:"🐢", name:"Výklus / chůze",      pct:60, dist:"3–8 km",    info:"Den po závodě nebo po very hard tréninku. Srdcová frekvence pod 120 tepů. Klidně i chůze.",      bg:"rgba(79,195,247,.06)", border:"rgba(79,195,247,.2)", col:"#4fc3f7" },
              { icon:"🏃", name:"Regenerační klus",     pct:65, dist:"5–12 km",   info:"2–3× týdně jako doplněk. Dýcháš pohodlně, zvládneš mluvit ve větách. Pocit: mohl bych takhle celý den.", bg:"rgba(41,182,246,.06)", border:"rgba(41,182,246,.2)", col:"#29b6f6" },
              { icon:"🏃‍♂️", name:"Volný běh (krátký)",  pct:70, dist:"8–15 km",   info:"Základní tréninková jednotka. Lehce dýcháš, konverzuješ. Nikam nespěcháš.", bg:"rgba(102,187,106,.06)", border:"rgba(102,187,106,.2)", col:"#66bb6a" },
              { icon:"🌄", name:"Volný běh (střední)",  pct:75, dist:"15–22 km",  info:"Středa nebo pátek. Buduje aerobní základ. Konec musí být stejně pohodlný jako začátek.", bg:"rgba(174,213,129,.06)", border:"rgba(174,213,129,.2)", col:"#aed581" },
              { icon:"🏔️", name:"Longrun (volný)",       pct:80, dist:"22–30 km",  info:"Nedělní longrun. Pomalý, ale plynulý. Po 25+ km tělo sahá do tukových zásob — o tom to je.", bg:"rgba(255,202,40,.06)", border:"rgba(255,202,40,.2)", col:"#ffca28" },
              { icon:"⚡", name:"Longrun (maraton tempo)", pct:88, dist:"28–35 km", info:"Posledních 8–12 km longrunu zrychlíš na maratonské tempo. Nejtěžší tréninková jednotka v přípravě.", bg:"rgba(255,167,38,.06)", border:"rgba(255,167,38,.2)", col:"#ffa726" },
            ].map((item,i)=>{
              const sec = paceAtPct(refSec, item.pct);
              return (
                <div key={i} style={{background:item.bg,border:`1px solid ${item.border}`,borderRadius:12,padding:"16px 18px",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
                    <div style={{fontSize:28,lineHeight:1,marginTop:2}}>{item.icon}</div>
                    <div style={{flex:1,minWidth:160}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap",marginBottom:4}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:"#e8e8e8"}}>{item.name}</div>
                        <div style={{fontSize:10,color:item.col,letterSpacing:"1px",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{item.dist}</div>
                      </div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:28,color:item.col,marginBottom:6,lineHeight:1}}>
                        {fmtPace(sec)}<span style={{fontSize:13,color:"#555",fontFamily:"Barlow,sans-serif",fontWeight:400,marginLeft:6}}>min/km</span>
                        <span style={{fontSize:13,color:"#555",fontFamily:"Barlow,sans-serif",fontWeight:400,marginLeft:10}}>{item.pct}% · {(3600/sec).toFixed(1)} km/h</span>
                      </div>
                      <div style={{fontSize:12,color:"#666",lineHeight:1.65}}>{item.info}</div>
                    </div>
                  </div>
                </div>
              );
            })}

            <div style={{marginTop:6,padding:"12px 16px",background:"#111",borderRadius:10,fontSize:11,color:"#444",lineHeight:1.7}}>
              💡 <strong style={{color:"#666"}}>Pravidlo 80/20:</strong> 80 % tréninku na nízkých zónách (výklus + volný běh), 20 % na intenzitě.
              Většina amatérů trénuje příliš rychle a výsledkem je stagnace a zranění.
            </div>
          </div>

          {/* Quick ref boxes */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:10,marginBottom:14}}>
            {[
              {label:"Výklus",        pct:62},
              {label:"Volný běh",     pct:72},
              {label:"Longrun",       pct:80},
              {label:"Maraton tempo", pct:93},
              {label:"Práh ⚡",       pct:95},
              {label:"1km intervaly", pct:100},
            ].map((b,i)=>(
              <div key={i} className="rbox">
                <div className="rbox-lbl">{b.label}</div>
                <div className="rbox-val g">{fmtPace(paceAtPct(refSec,b.pct))}<span style={{fontSize:13,color:"#555",marginLeft:3}}>min/km</span></div>
                <div style={{fontSize:10,color:"#444",marginTop:3}}>{b.pct}% temp.</div>
              </div>
            ))}
          </div>
        </div>
      );
